name: Lambda Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstal dependensi langsung ke root direktori seperti deploy.yml
          pip install -r requirements.txt -t .

      - name: Package Lambda
        run: |
          # Mengezip seluruh isi repositori dengan nama package dan pengecualian yang sama persis
          zip -r deployment-KYCFastAPIFunctionExternal-package.zip . -x \
            "*.git*" \
            ".github/*" \
            "*.zip" \
            "__pycache__/*" \
            "*.pyc" \
            "*.md" \
            ".gitignore"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-external-package
          path: deployment-KYCFastAPIFunctionExternal-package.zip
